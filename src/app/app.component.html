<div *ngIf="loading" class="d-flex justify-content-center vw-100 vh-100 align-items-center">
  <div class="spinner-border text-info" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>
<h1 class="text-center my-4">{{title}}</h1>
<div class="d-flex justify-content-center my-4">
  <div class="form col-md-8 col-lg-6 col-xl-6">


    <div *ngIf="!loading && (result === undefined || result.length === 0)">
      <label for="option">Seleccione el tipo de juego</label>
      <select name="option" id="option" class="form-control form-control-sm" #option>
        <option value="1">Amigo Dulce</option>
      </select>
      <br>
      <label for="groups">Ingrese el listado de personas separados por un salto de linea</label>
      <textarea name="groups" id="groups" class="form-control form-control-sm" cols="30" rows="10" #groups></textarea>
    
      <br>
      <div class="col-12 d-flex justify-content-center">
        <button name="send" id="send" class="btn btn-primary col-6" type="submit" (click)="send(option.value, groups.value);">Send</button>
      </div>
    </div>

    <div *ngIf="!loading && result && result.length > 0">
        <h4 class="text-center">{{game}}</h4>
        <br>
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th>#</th>
              <th>Participante</th>
              <th>Amigo dulce</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of result; let i = index;">
              <th>{{ i + 1 }}</th>
              <td>{{item.person}}</td>
              <td>{{item.personSecret}}</td>
            </tr>
          </tbody>
        </table>

        <br>
      <div class="col-12 d-flex justify-content-center">
        <button name="reset" id="reset" class="btn btn-secondary col-6" type="submit" (click)="reset();">Send</button>
      </div>
      </div>
  </div>
</div>
